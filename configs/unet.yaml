seed: 42
device: cuda
output_dir: outputs/unet

data:
  root_dir: data
  train_split: train
  val_split: valid
  test_split: test
  task_mode: multiclass
  img_size: 320
  batch_size: 2
  num_workers: 0
  persistent_workers: false
  prefetch_factor: 1

model:
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3

train:
  epochs: 25
  learning_rate: 0.0003
  weight_decay: 0.00001
  amp: true
  threshold: 0.5
  cudnn_benchmark: true
  channels_last: true
  compile: false
  compile_mode: reduce-overhead
  grad_accum_steps: 1
  early_stopping_patience: 5
  monitor_metric: val_dice